<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&C Unblocked</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#0a0f1a">

    <style>
        body {
            margin: 0;
            background: #0a0f1a;
            color: white;
            font-family: system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #0d1320;
            border-right: 2px solid #1a73e8;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #1a73e8;
        }

        .game-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #111827;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .game-item:hover {
            background: #1a73e8;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hero section */
        .hero {
            padding: 25px;
            border-bottom: 2px solid #1a73e8;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hero img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
        }

        .hero-text h1 {
            margin: 0;
            font-size: 26px;
        }

        .hero-text p {
            margin: 4px 0 0;
            opacity: 0.8;
        }

        /* Embed area */
        .embed-area {
            flex: 1;
            background: #05070d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Right panel */
        .right-panel {
            width: 260px;
            background: #0d1320;
            border-left: 2px solid #1a73e8;
            padding: 20px;
        }

        .panel-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: #1a73e8;
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .panel-btn:hover {
            background: #1664c4;
        }
    </style>

    <script>
        function loadGame(url) {
            document.getElementById("gameFrame").src = url;
        }
    </script>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Games</h2>

        <div class="game-item" onclick="loadGame('https://game.azgame.io/traffic-rally/#')">Traffic Rally</div>
        <div class="game-item" onclick="loadGame('https://www.scary-teacher.com/wp-content/uploads/games/scary-teacher.html')">Scary Teacher</div>
        <div class="game-item" onclick="loadGame('https://2v2.io/')">2v2.io</div>
        <div class="game-item" onclick="loadGame('https://gamea.azgame.io/ice-baby-quest/')">Ice Baby Quest</div>
        <div class="game-item" onclick="loadGame('https://gamea.azgame.io/ice-baby-quest-2/')">Ice Baby Quest 2</div>
        <div class="game-item" onclick="loadGame('https://azgames.io/arcade-tennis.embed')">Arcade Tennis</div>
        <div class="game-item" onclick="loadGame('https://veck.io/')">Veck.io</div>
        <div class="game-item" onclick="loadGame('https://survev.io/#')">Survev.io</div>
        <div class="game-item" onclick="loadGame('https://roblnet13.github.io/pvz/game/iframe.html#')">Plants vs Zombies</div>
        <div class="game-item" onclick="loadGame('https://notan127.github.io/SM64-PC-Port-WebGL/classic/')">Super Mario 64</div>
        <div class="game-item" onclick="loadGame('https://space-waves-unblocked.github.io/space-waves/#')">Space Waves</div>
        <div class="game-item" onclick="loadGame('https://azgames.io/arcade-volley.embed')">Arcade Volley</div>
    </div>

    <!-- Main content -->
    <div class="main">

        <!-- Hero -->
        <div class="hero">
            <img src="favicon.png" alt="Logo">
            <div class="hero-text">
                <h1>J&C Unblocked</h1>
                <p>Your stealth game launcher at school.</p>
            </div>
        </div>

        <!-- Embed area -->
        <div class="embed-area">
            <iframe id="gameFrame" src="" onerror="this.src='favicon.png'"></iframe>
        </div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">
        <a class="panel-btn" href="https://moneyenr123.github.io/JC-Unblocked-GameHub/" target="_blank">Open Game Hub</a>
        <a class="panel-btn" href="https://moneyenr123.github.io/JC-Browser/" target="_blank">Launch Browser</a>
        <a class="panel-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSd5LiEiN4MvVdlFTmpZyd_D2X0GZg3r3Oxs7YBwhCD31N3hTA/viewform" target="_blank">Request Game</a>
        <a class="panel-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSck2HgITNfg7ibdiNVpO-u_Q6ctizTq5N4ul1jvZUFX1O4cYw/viewform" target="_blank">Report Bug</a>
    </div>

</body>
</html>

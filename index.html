<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J&C Unblocked</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ROOT THEME */
:root {
    --bg-main: #020617;
    --bg-elevated: #020617;
    --bg-card: #020617;
    --bg-sidebar: #020617;
    --accent: #38bdf8;
    --accent-soft: rgba(56,189,248,0.15);
    --accent-strong: #0ea5e9;
    --text-main: #e5e7eb;
    --text-muted: #9ca3af;
    --border-subtle: #1f2937;
    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-soft: 0 18px 45px rgba(15,23,42,0.9);
    --shadow-glow: 0 0 25px rgba(56,189,248,0.45);
    --transition-fast: 0.18s ease-out;
    --transition-med: 0.25s ease-out;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0b1120 0, #020617 45%, #000 100%);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
}

a { color: inherit; }

/* APP LAYOUT */
.app-shell {
    display: flex;
    width: 100%;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 270px;
    background: #020617;
    border-right: 1px solid var(--border-subtle);
    padding: 18px;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 18px;
    z-index: 20;
}

.sidebar-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: var(--radius-lg);
    background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 55%);
    box-shadow: 0 0 0 1px rgba(15,23,42,0.9);
}

.sidebar-header img {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    box-shadow: var(--shadow-glow);
}

.sidebar-title { font-size: 19px; font-weight: 800; }
.sidebar-subtitle { font-size: 11px; color: var(--text-muted); }

/* MAIN CONTENT */
.main {
    margin-left: 270px;
    width: calc(100% - 270px);
    padding: 22px;
}

.main-inner {
    max-width: 1120px;
    margin: 0 auto;
}

/* HERO SECTION */
.hero {
    text-align: center;
    margin-top: 40px;
}

.hero-logo {
    width: 160px;
    margin-bottom: 20px;
}

.hero-title {
    font-size: 32px;
    font-weight: 800;
}

.hero-subtitle {
    font-size: 16px;
    color: var(--text-muted);
    margin-top: 6px;
}

.hero-description {
    margin-top: 20px;
    font-size: 15px;
    color: var(--text-muted);
}

/* STATUS BAR */
.status-bar {
    margin-top: 30px;
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
}

.status-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}
</style>
</head>

<body>
<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">

    <div class="sidebar-header">
        <img src="favicon.png" alt="Logo">
        <div>
            <div class="sidebar-title">J&C Unblocked</div>
            <div class="sidebar-subtitle">School‑friendly game hub</div>
        </div>
    </div>

    <input id="gameSearch" type="text" placeholder="Search..."
    style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid #1f2937;background:#0b1120;color:#e5e7eb;font-size:14px;outline:none;margin-top:6px;">

    <!-- NAVIGATION -->
    <div class="sidebar-section-label">Main</div>
    <div class="nav-group">
        <a class="nav-link" onclick="showPage('home')"><span class="nav-dot"></span><span>Home</span></a>
        <a class="nav-link" href="https://moneyenr123.github.io/JC-Unblocked-GameHub/" target="_blank"><span class="nav-dot"></span><span>Game Hub</span></a>
        <a class="nav-link" href="https://moneyenr123.github.io/JC-Browser/" target="_blank"><span class="nav-dot"></span><span>Unblocked Browser</span></a>
    </div>
